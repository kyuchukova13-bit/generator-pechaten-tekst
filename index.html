<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Тренажор по ръкопис - Индивидуален</title>
    <style>
        @font-face {
            font-family: 'BoyanMaga';
            src: url('Boyan_Maga-Regular.ttf') format('truetype');
        }
        :root { --dark: #2c3e50; --blue: #3498db; --green: #2ecc71; --red: #e74c3c; --orange: #e67e22; --bg: #f0f4f8; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { margin: 0; padding: 0; height: 100vh; font-family: 'Segoe UI', sans-serif; background: var(--bg); overflow: hidden; touch-action: none; }

        #start-screen { 
            position: fixed; inset: 0; background: #112233;
            display: flex; flex-direction: row; align-items: center; justify-content: center; 
            z-index: 3000; overflow-y: auto; padding: 40px; gap: 50px; 
        }
        .left-panel { flex: 0 0 380px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .main-title { color: white; font-size: 2.2rem; margin: 0 0 10px 0; border-bottom: 3px solid var(--blue); padding-bottom: 10px; }
        .logo-wrap img { max-width: 250px; border-radius: 15px; background: white; padding: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .brand-text { color: white; font-size: 1.2rem; font-weight: bold; margin: 0; text-transform: uppercase; }
        
        .right-panel { flex: 1; max-width: 800px; }
        .alphabet-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(65px, 1fr)); gap: 12px; width: 100%; }
        .letter-card { 
            background: #2c3e50; border: 2px solid #556677; border-radius: 15px; height: 75px; 
            display: flex; align-items: center; justify-content: center; font-family: 'BoyanMaga'; 
            font-size: 2rem; color: #ecf0f1; cursor: pointer; transition: 0.1s;
        }
        .letter-card:hover { background: #34495e; border-color: var(--blue); transform: scale(0.95); }

        #app-screen { display: none; flex-direction: column; height: 100vh; background: var(--bg); }
        .top-bar { height: 60px; background: white; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #ddd; z-index: 10; }
        .back-btn { background: #eee; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .current-letter-display { font-family: 'BoyanMaga'; font-size: 2rem; color: var(--blue); }
        
        .workspace { flex: 1; display: flex; flex-direction: column; padding: 15px; position: relative; }
        .canvas-container { flex: 1; background: white; border-radius: 20px; border: 2px solid #ccc; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 100%; display: block; touch-action: none; }

        .bottom-bar { height: 80px; background: white; display: flex; align-items: center; justify-content: center; gap: 15px; padding: 0 15px; border-top: 2px solid #ddd; }
        .action-btn { flex: 1; max-width: 250px; height: 55px; border-radius: 15px; border: none; font-weight: bold; font-size: 1.2rem; cursor: pointer; color: white; text-transform: uppercase; }
        .btn-check { background: var(--green); }
        .btn-clear { background: var(--red); }

        #result-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; padding: 20px; text-align: center; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; color: white; margin-bottom: 20px; }
        #hidden-canvas { display: none; }
    </style>
</head>
<body>

<div id="start-screen">
    <div class="left-panel">
        <h1 class="main-title">Тренажор по ръкопис</h1>
        <div class="logo-wrap"><img src="logo.png"></div>
        <p class="brand-text">Образователни решения</p>
        
        <div style="margin-top: 40px; color: white; width: 100%; background: rgba(255,255,255,0.1); padding: 20px; border-radius: 20px;">
            <p style="margin: 0 0 10px 0; font-size: 0.9rem;">СТРОГОСТ НА ОЦЕНЯВАНЕ:</p>
            <input type="range" id="strictness" min="1" max="10" value="5" style="width: 100%;">
            <div style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #bdc3c7; margin-top: 5px;">
                <span>ПО-ЛЕКО</span>
                <span>КРИТИЧНО</span>
            </div>
        </div>
    </div>
    <div class="right-panel">
        <div class="alphabet-grid" id="alphabet-grid"></div>
    </div>
</div>

<div id="app-screen">
    <div class="top-bar">
        <button class="back-btn" onclick="showAlphabet()">⬅ АЗБУКА</button>
        <div class="current-letter-display" id="top-letter">Аа</div>
        <div style="width: 80px;"></div>
    </div>
    <div class="workspace">
        <div class="canvas-container"><canvas id="main-canvas"></canvas></div>
    </div>
    <div class="bottom-bar">
        <button class="action-btn btn-clear" onclick="drawScene()">ИЗЧИСТИ</button>
        <button class="action-btn btn-check" onclick="checkScore()">ПРОВЕРИ</button>
    </div>
</div>

<div id="result-overlay">
    <div class="score-circle" id="score-display">0%</div>
    <h2 id="result-msg">Добра работа!</h2>
    <div style="display: flex; gap: 15px; margin-top: 30px;">
        <button class="action-btn" style="background: var(--blue); padding: 0 20px;" onclick="retryLetter()">ОПИТАЙ ПАК</button>
        <button class="action-btn" style="background: var(--orange); padding: 0 20px;" onclick="showAlphabet()">ДРУГА БУКВА</button>
    </div>
</div>

<canvas id="hidden-canvas"></canvas>

<script>
    const alphabet = "АБВГДЕЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЬЮЯ".split('');
    let currentLetter = 'А';
    let isDrawing = false;
    let hasDrawn = false;
    let currentPointIndex = 0; 
    
    const canvas = document.getElementById('main-canvas');
    const ctx = canvas.getContext('2d', {willReadFrequently: true});
    const hCan = document.getElementById('hidden-canvas');
    const hCtx = hCan.getContext('2d', {willReadFrequently: true});

    // Твоите прецизни конфигурации остават непокътнати
    const letterConfig = {
        'А': { cap: [{x:-94, y:-11}, {x:-36, y:-96}], low: [{x:6, y:-62}] },
        'Б': { cap: [{x:16, y:-156}, {x:-6, y:-92}, {x:-40, y:-125}], low: [{x:11, y:-68}] },
        'В': { cap: [{x:16, y:-168}, {x:-31, y:-125}], low: [{x:-24, y:-39}] },
        'Г': { cap: [{x:24, y:-167}, {x:-30, y:-122}], low: [{x:-27, y:-39}] },
        'Д': { cap: [{x:24, y:-168}], low: [{x:11, y:-62}] },
        'Е': { cap: [{x:52, y:-173}], low: [{x:-31, y:-33}] },
        'Ж': { cap: [{x:-96, y:-136}, {x:-38, y:-85}, {x:118, y:-175}], low: [{x:-63, y:-44}, {x:-20, y:-37}, {x:44, y:-62}] },
        'З': { cap: [{x:-28, y:-173}], low: [{x:-33, y:-40}] },
        'И': { cap: [{x:-77, y:-128}, {x:64, y:-196}], low: [{x:-43, y:-41}, {x:18, y:-76}] },
        'Й': { cap: [{x:-77, y:-128}, {x:64, y:-196},{x:-9, y:-210}], low: [{x:-43, y:-41}, {x:18, y:-76}, {x:-14, y:-91}] },
        'К': { cap: [{x:-73, y:-176}, {x:92, y:-188}], low: [{x:-40, y:-43}, {x:-6, y:-32}] },
        'Л': { cap: [{x:-73, y:-52}], low: [{x:-39, y:-38}] },
        'М': { cap: [{x:-104, y:-48}], low: [{x:-41, y:-34}] },
        'Н': { cap: [{x:-72, y:-180}, {x:-10, y:-109}, {x:78, y:-199}], low: [{x:-42, y:-40}, {x:-14, y:-43}, {x:19, y:-73}] },
        'О': { cap: [{x:10, y:-193}], low: [{x:8, y:-75}] },
        'П': { cap: [{x:-4, y:-160}, {x:65, y:-160}, {x:-54, y:-124}], low: [{x:-32, y:-41}, {x:-11, y:-42}] },
        'Р': { cap: [{x:20, y:-168},{x:2-23, y:-106}], low: [{x:-42, y:-43},{x:-22, y:-39}] },
        'С': { cap: [{x:28, y:-140}], low: [{x:9, y:-61}] },
        'Т': { cap: [{x:-22, y:-162}, {x:33, y:-160}, {x:88, y:-164}, {x:-70, y:-124}], low: [{x:-56, y:-38}, {x:-28, y:-40}, {x:12, y:-42}] },
        'У': { cap: [{x:-63, y:-122}], low: [{x:-42, y:-44}] },
        'Ф': { cap: [{x:-45, y:-228}, {x:13, y:-191}], low: [{x:24, y:-159}, {x:12, y:-68}] },
        'Х': { cap: [{x:-62, y:-129}, {x:91, y:-172}], low: [{x:-44, y:-44}, {x:24, y:-62}] },
        'Ц': { cap: [{x:-90, y:-125}], low: [{x:-50, y:-42.3}] },
        'Ч': { cap: [{x:-73, y:-121}], low: [{x:-36, y:-38}] },
        'Ш': { cap: [{x:-116, y:-125}], low: [{x:-58, y:-43}] },
        'Щ': { cap: [{x:-119, y:-128}], low: [{x:-56, y:-45}] },
        'Ъ': { cap: [{x:1-73, y:-180}], low: [{x:-36, y:-42}] },
        'Ь': { cap: [{x:-17, y:-198}], low: [{x:-24, y:-43}] },
        'Ю': { cap: [{x:-78, y:-172},{x:-35, y:-108}, {x:64, y:-176}], low: [{x:-43, y:-62},{x:-15, y:-39}, {x:28, y:-68}] },
        'Я': { cap: [{x:-74, y:-46}], low: [{x:-36, y:-31}] }
    };

    function initAlphabet() {
        const grid = document.getElementById('alphabet-grid');
        grid.innerHTML = "";
        alphabet.forEach(letter => {
            const card = document.createElement('div');
            card.className = 'letter-card';
            card.innerText = letter;
            card.onclick = () => selectLetter(letter);
            grid.appendChild(card);
        });
    }

    function selectLetter(letter) {
        currentLetter = letter;
        document.getElementById('top-letter').innerText = letter + letter.toLowerCase();
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
        setTimeout(drawScene, 100);
    }

    function showAlphabet() {
        document.getElementById('app-screen').style.display = 'none';
        document.getElementById('result-overlay').style.display = 'none';
        document.getElementById('start-screen').style.display = 'flex';
    }

    function drawScene() {
        hasDrawn = false;
        currentPointIndex = 0; 
        canvas.width = canvas.parentElement.clientWidth;
        canvas.height = canvas.parentElement.clientHeight;
        const w = canvas.width, h = canvas.height, mid = h/2;
        const rowH = Math.min(90, h / 4.5), baseLine = mid + rowH/2;

        ctx.clearRect(0, 0, w, h);
        ctx.strokeStyle = "#74b9ff"; ctx.lineWidth = 2;
        [mid - rowH*1.5, mid - rowH/2, mid + rowH/2, mid + rowH*1.5].forEach(y => {
            ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(w, y); ctx.stroke();
        });

        const drawTemplate = (txt, x, size) => {
            ctx.font = size + "px 'BoyanMaga'";
            ctx.fillStyle = "#f4f6f8"; ctx.textAlign = "center"; ctx.textBaseline = "alphabetic";
            ctx.fillText(txt, x, baseLine - 3);
            ctx.strokeStyle = "#a5b1c2"; ctx.setLineDash([8, 5]); ctx.strokeText(txt, x, baseLine - 3);
            ctx.setLineDash([]);
        };

        drawTemplate(currentLetter, w/2 - rowH*1.2, rowH * 2.0);
        drawTemplate(currentLetter.toLowerCase(), w/2 + rowH*1.2, rowH * 1.5);

        renderPoints();
        drawHiddenTarget(w, h, rowH, baseLine);
    }

    function renderPoints() {
        const h = canvas.height, rowH = Math.min(90, h / 4.5), baseLine = (h/2) + rowH/2;
        const conf = letterConfig[currentLetter];
        if (!conf) return;

        const drawPts = (pts, bx, offset) => {
            pts?.forEach((pt, i) => {
                const globalIdx = i + offset;
                ctx.fillStyle = globalIdx < currentPointIndex ? "#2ecc71" : "orange"; 
                ctx.beginPath(); 
                ctx.arc(bx + pt.x, baseLine + pt.y, 12, 0, Math.PI*2); 
                ctx.fill();
                ctx.fillStyle = "white"; ctx.font = "bold 12px Arial"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
                ctx.fillText(i + 1, bx + pt.x, baseLine + pt.y);
            });
        };
        const capLen = letterConfig[currentLetter].cap ? letterConfig[currentLetter].cap.length : 0;
        drawPts(conf.cap, canvas.width/2 - rowH*1.2, 0);
        drawPts(conf.low, canvas.width/2 + rowH*1.2, capLen);
    }

    function drawHiddenTarget(w, h, rowH, baseLine) {
        hCan.width = w; hCan.height = h;
        hCtx.textAlign = "center"; hCtx.textBaseline = "alphabetic";
        hCtx.lineWidth = 30; hCtx.strokeStyle = "black"; hCtx.lineCap = "round";
        hCtx.font = (rowH * 2.0) + "px 'BoyanMaga'";
        hCtx.strokeText(currentLetter, w/2 - rowH*1.2, baseLine - 3);
        hCtx.font = (rowH * 1.5) + "px 'BoyanMaga'";
        hCtx.strokeText(currentLetter.toLowerCase(), w/2 + rowH*1.2, baseLine - 3);
    }

    const getPos = (e) => {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - r.left, y: clientY - r.top };
    };

    const startDraw = (e) => {
        const p = getPos(e);
        const h = canvas.height, rowH = Math.min(90, h / 4.5), baseLine = (h/2) + rowH/2;
        const conf = letterConfig[currentLetter];
        
        if(conf) {
            const allPoints = [
                ...(conf.cap || []).map(pt => ({x: pt.x + canvas.width/2 - rowH*1.2, y: pt.y + baseLine})),
                ...(conf.low || []).map(pt => ({x: pt.x + canvas.width/2 + rowH*1.2, y: pt.y + baseLine}))
            ];

            const targetPt = allPoints[currentPointIndex];
            if (targetPt) {
                if (Math.hypot(p.x - targetPt.x, p.y - targetPt.y) < 40) {
                    isDrawing = true; hasDrawn = true;
                    currentPointIndex++;
                    renderPoints();
                    ctx.beginPath(); ctx.moveTo(p.x, p.y);
                    return;
                }
            }
            showToast(`ЗАПОЧНИ ОТ ТОЧКА ${currentPointIndex + 1}! ✨`);
            isDrawing = false;
        } else {
            isDrawing = true; ctx.beginPath(); ctx.moveTo(p.x, p.y);
        }
    };

    const moveDraw = (e) => {
        if (!isDrawing) return;
        const p = getPos(e);
        ctx.lineTo(p.x, p.y); ctx.strokeStyle = "#2c3e50"; ctx.lineWidth = 10; ctx.lineCap = "round"; ctx.stroke();
    };

    function checkScore() {
        const uData = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        const tData = hCtx.getImageData(0, 0, hCan.width, hCan.height).data;
        const strictness = document.getElementById('strictness').value;
        let targetPx = 0, hits = 0, misses = 0;

        for (let i = 0; i < uData.length; i += 4) {
            const isUser = uData[i+3] > 50, isTarget = tData[i+3] > 100;
            if (isTarget) targetPx++;
            if (isUser) { if (isTarget) hits++; else misses++; }
        }

        let score = targetPx > 0 ? Math.round(((hits / targetPx) * 100) - ((misses / targetPx) * 100 * strictness * 0.5)) : 0;
        score = Math.max(0, Math.min(100, score));
        
        document.getElementById('score-display').innerText = score + "%";
        document.getElementById('score-display').style.background = score > 80 ? "var(--green)" : (score > 50 ? "var(--orange)" : "var(--red)");
        document.getElementById('result-overlay').style.display = 'flex';
    }

    function showToast(m) {
        let t = document.getElementById('toast') || document.createElement('div');
        t.id = 'toast'; t.innerText = m;
        t.style.cssText = 'position:fixed; top:20px; left:50%; transform:translateX(-50%); background:orange; color:white; padding:10px 20px; border-radius:20px; z-index:10000;';
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 2000);
    }

    function retryLetter() { document.getElementById('result-overlay').style.display = 'none'; drawScene(); }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', moveDraw);
    window.addEventListener('mouseup', () => isDrawing = false);
    canvas.addEventListener('touchstart', (e) => { e.preventDefault(); startDraw(e); });
    canvas.addEventListener('touchmove', (e) => { e.preventDefault(); moveDraw(e); });
    window.onload = initAlphabet;
</script>
</body>
</html>
